# Serves the static web client and proxies the API to the gateway.
#
# Fronting both from one origin means the browser makes same-origin requests:
# no CORS preflights, no cross-origin WebSocket rules. This is also the shape
# the Q4 NGINX ingress takes, so the local topology matches production.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Static assets.
    #
    # no-store, not no-cache. The client ships unversioned filenames (app.js, not
    # app.a1b2c3.js), so the URL cannot tell the browser that the contents
    # changed. `no-cache` only asks it to revalidate, and browsers still reuse
    # cached ES modules within a page's module map — which in practice served a
    # stale app.js against a newer GraphQL schema.
    #
    # The right long-term fix is content-hashed filenames plus immutable caching;
    # until this has a build step, correctness beats the round trip.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, must-revalidate";
    }

    # GraphQL queries and mutations.
    #
    # `=` (exact match), not a prefix: a bare `location /graphql` also captures
    # /graphql.js — our own client module — and proxies it to the gateway, which
    # has no such route and answers with the playground's HTML. The browser then
    # refuses to evaluate HTML as an ES module, and the whole app fails to boot.
    location = /graphql {
        proxy_pass http://gateway:8080/graphql;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # GraphQL subscriptions. The Upgrade/Connection pair is what turns this into
    # a WebSocket tunnel; without it NGINX would silently downgrade to HTTP/1.1
    # and the socket would never open.
    location = /ws {
        proxy_pass http://gateway:8080/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Long-lived: a quiet game must not be cut off mid-think. The gateway
        # sends keepalive pings every 10s, well inside this window.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }
}
