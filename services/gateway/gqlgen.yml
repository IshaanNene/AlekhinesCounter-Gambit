schema:
  - graph/schema.graphqls

exec:
  filename: graph/generated/generated.go
  package: generated

model:
  filename: graph/model/models_gen.go
  package: model

resolver:
  layout: follow-schema
  dir: graph
  package: graph
  filename_template: "{name}.resolvers.go"

# Keep the gateway free of business logic: models are plain DTOs mapped from the
# internal gRPC types by the resolvers.
autobind: []

models:
  # `clock` lives in the session-manager, not the game-service. Make it a field
  # resolver so we only pay that extra gRPC hop when a client actually selects it.
  Game:
    fields:
      clock:
        resolver: true
  ID:
    model:
      - github.com/99designs/gqlgen/graphql.ID
      - github.com/99designs/gqlgen/graphql.String
  Int:
    model:
      - github.com/99designs/gqlgen/graphql.Int
      - github.com/99designs/gqlgen/graphql.Int64
      - github.com/99designs/gqlgen/graphql.Int32
  Time:
    model:
      - github.com/99designs/gqlgen/graphql.Time
