run:
  timeout: 5m

issues:
  exclude-dirs:
    - proto/gen
  exclude-rules:
    # Tests may use fatal helpers and long lines freely.
    - path: _test\.go
      linters:
        - errcheck

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - bodyclose
    - revive

linters-settings:
  goimports:
    local-prefixes: github.com/IshaanNene/AlekhinesCounter-Gambit
  revive:
    rules:
      - name: exported
        disabled: true
