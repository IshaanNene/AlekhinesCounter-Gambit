syntax = "proto3";

package alekhine.game.v1;

import "google/protobuf/timestamp.proto";

// GameService is the authoritative source of game state: it validates moves,
// persists them, and (for games against the engine) produces the reply move.
service GameService {
  // CreateGame starts a new game and returns it in its initial state.
  rpc CreateGame(CreateGameRequest) returns (CreateGameResponse);
  // SubmitMove validates and applies a move, returning the updated game.
  rpc SubmitMove(SubmitMoveRequest) returns (SubmitMoveResponse);
  // GetGame returns a game and its full move list.
  rpc GetGame(GetGameRequest) returns (GetGameResponse);
  // Resign ends a game in the opponent's favour.
  rpc Resign(ResignRequest) returns (ResignResponse);
  // JoinGame claims the open Black seat of a game awaiting an opponent.
  rpc JoinGame(JoinGameRequest) returns (JoinGameResponse);
  // ListGames returns a user's game history, most recent first.
  rpc ListGames(ListGamesRequest) returns (ListGamesResponse);
  // Leaderboard returns the highest-rated accounts.
  rpc Leaderboard(LeaderboardRequest) returns (LeaderboardResponse);
  // GamePgnUrl returns a short-lived download URL for a finished game's PGN.
  rpc GamePgnUrl(GamePgnUrlRequest) returns (GamePgnUrlResponse);
  // GetAnalysis returns a finished game's report. NOT_FOUND while the worker
  // has not analysed it yet — an ordinary state, not an error.
  rpc GetAnalysis(GetAnalysisRequest) returns (GetAnalysisResponse);
  // LegalMoves lists every legal move in a game's current position. Clients use
  // it to highlight destinations and validate premoves without reimplementing
  // move generation — the rules stay in one place.
  rpc LegalMoves(LegalMovesRequest) returns (LegalMovesResponse);
}

// Status is the lifecycle state / result of a game.
enum Status {
  STATUS_UNSPECIFIED = 0;
  STATUS_IN_PROGRESS = 1;
  STATUS_WHITE_WON = 2;
  STATUS_BLACK_WON = 3;
  STATUS_DRAW = 4;
}

// How a finished game ended (unset while in progress).
enum EndReason {
  END_REASON_UNSPECIFIED = 0;
  END_REASON_CHECKMATE = 1;
  END_REASON_STALEMATE = 2;
  END_REASON_INSUFFICIENT_MATERIAL = 3;
  END_REASON_FIFTY_MOVE = 4;
  END_REASON_THREEFOLD = 5;
  END_REASON_RESIGNATION = 6;
}

message Move {
  // Half-move number, starting at 1.
  uint32 ply = 1;
  // Move in UCI long algebraic notation.
  string uci = 2;
  // Resulting position after the move, in FEN.
  string fen_after = 3;
}

message Game {
  string id = 1;
  // Current position in FEN.
  string fen = 2;
  Status status = 3;
  EndReason end_reason = 4;
  // Present when the game is played against the engine.
  bool vs_engine = 5;
  // True while a human game is still waiting for an opponent.
  bool awaiting_opponent = 11;
  // True when the result will move both players' Elo.
  bool rated = 12;
  string white_id = 6;
  // Empty when vs_engine is true.
  string black_id = 7;
  repeated Move moves = 8;
  google.protobuf.Timestamp started_at = 9;
  google.protobuf.Timestamp ended_at = 10;
}

message CreateGameRequest {
  // Player who owns the white pieces.
  string white_id = 1;
  // Opponent id. Leave empty for an open seat another player can join; ignored
  // when vs_engine is true.
  string black_id = 2;
  // Engine search depth for reply moves (used only when playing the engine).
  uint32 engine_depth = 3;
  // Time control for the live session (human-vs-human games). Zero lets the
  // session-manager apply its defaults.
  int64 initial_ms = 4;
  int64 increment_ms = 5;
  // Rated games move both players' Elo on completion. Ignored for engine games.
  bool rated = 6;
  // Play against the engine. When false and black_id is empty, the game waits
  // for an opponent to join — a NULL black_id alone cannot distinguish the two.
  bool vs_engine = 7;
}

message CreateGameResponse {
  Game game = 1;
}

message SubmitMoveRequest {
  string game_id = 1;
  // Move in UCI long algebraic notation.
  string uci = 2;
  // Player making the move. Required for human-vs-human games, where it is
  // checked against the side to move; optional for games against the engine.
  string player_id = 3;
}

message SubmitMoveResponse {
  // Updated game, including the engine's reply move when applicable.
  Game game = 1;
}

message GetGameRequest {
  string game_id = 1;
}

message GetGameResponse {
  Game game = 1;
}

message ResignRequest {
  string game_id = 1;
  // The player giving up; must be a participant.
  string player_id = 2;
}

message ResignResponse {
  Game game = 1;
}

message JoinGameRequest {
  string game_id = 1;
  // The player claiming the Black seat.
  string player_id = 2;
}

message JoinGameResponse {
  Game game = 1;
}

message LegalMovesRequest {
  string game_id = 1;
}

message LegalMovesResponse {
  // Legal moves in UCI notation for the side to move. Empty when the game is
  // over (checkmate or stalemate).
  repeated string uci = 1;
}

message GamePgnUrlRequest {
  string game_id = 1;
}

message GamePgnUrlResponse {
  // Presigned, time-limited URL. Empty when the game has no archived PGN yet.
  string url = 1;
}

message GetAnalysisRequest {
  string game_id = 1;
}

// MoveVerdict is the engine's judgement on one played move.
message MoveVerdict {
  uint32 ply = 1;
  string uci = 2;
  string best_uci = 3;
  // Centipawns from the side-to-move's view, mates collapsed onto the scale.
  int32 eval_before_cp = 4;
  int32 eval_after_cp = 5;
  int32 centipawn_loss = 6;
  string quality = 7;
  bool matched_engine = 8;
}

message SideAnalysis {
  double accuracy = 1;   // 0..100
  double acpl = 2;
  double match_rate = 3; // 0..1
  uint32 blunders = 4;
  uint32 mistakes = 5;
  uint32 inaccuracies = 6;
}

message GetAnalysisResponse {
  string game_id = 1;
  uint32 depth = 2;
  SideAnalysis white = 3;
  SideAnalysis black = 4;
  repeated MoveVerdict moves = 5;
  // First position in the game never previously seen on this platform.
  string novelty_fen = 6;
  uint32 novelty_ply = 7;
  bool has_novelty = 8;
  google.protobuf.Timestamp analyzed_at = 9;
}

message ListGamesRequest {
  string user_id = 1;
  // Page size; the server clamps this, so a hostile client cannot ask for
  // everything at once.
  int32 limit = 2;
  int32 offset = 3;
}

// GameSummary is a history row: enough to list a game without its moves.
message GameSummary {
  string id = 1;
  string white_id = 2;
  string white_name = 3;
  string black_id = 4;  // empty for engine games
  string black_name = 5; // "Stockfish" for engine games
  bool vs_engine = 6;
  bool rated = 7;
  Status status = 8;
  EndReason end_reason = 9;
  int32 move_count = 10;
  // Rating change for the requested user. Only meaningful when has_elo_delta.
  int32 elo_delta = 11;
  bool has_elo_delta = 12;
  google.protobuf.Timestamp started_at = 13;
  google.protobuf.Timestamp ended_at = 14;
}

message ListGamesResponse {
  repeated GameSummary games = 1;
  int32 total = 2;
}

message LeaderboardRequest {
  int32 limit = 1;
}

message LeaderboardEntry {
  int32 rank = 1;
  string user_id = 2;
  string username = 3;
  int32 elo = 4;
  int32 games_played = 5;
}

message LeaderboardResponse {
  repeated LeaderboardEntry entries = 1;
}
