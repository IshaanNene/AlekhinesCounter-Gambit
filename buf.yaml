version: v2
modules:
  - path: proto
lint:
  use:
    - STANDARD
  except:
    - PACKAGE_VERSION_SUFFIX
    # We use a flatter layout (proto/game/v1) with a project-prefixed package
    # (alekhine.game.v1); the directory intentionally omits the alekhine/ prefix.
    - PACKAGE_DIRECTORY_MATCH
    # The session API deliberately reuses small messages (PlayerRef, Snapshot)
    # across several RPCs instead of minting a wrapper per method.
    - RPC_REQUEST_STANDARD_NAME
    - RPC_RESPONSE_STANDARD_NAME
    - RPC_REQUEST_RESPONSE_UNIQUE
breaking:
  use:
    - FILE
