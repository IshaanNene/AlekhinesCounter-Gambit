# Prometheus scrape config for the local stack. In Kubernetes this becomes a
# ServiceMonitor or annotation-based discovery; here the targets are static.
global:
  scrape_interval: 10s
  evaluation_interval: 10s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: acg-services
    static_configs:
      - targets:
          - game-service:9101
          - gateway:9101
          - engine-worker:9101
          - analysis-worker:9101
          - fanout:9101
        labels:
          platform: alekhine
