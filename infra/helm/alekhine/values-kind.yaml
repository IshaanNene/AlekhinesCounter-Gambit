# Overrides for a local kind cluster on a laptop: one replica of everything and
# no HPAs (kind ships no metrics-server, so an HPA would sit Unknown). Production
# values.yaml keeps the real replica counts and autoscaling.
global:
  imagePullPolicy: Never   # images are kind-loaded from the host, never pulled

services:
  gateway:
    replicas: 1
    # Publish the gateway on a NodePort so the kind port-mapping reaches it.
    nodePort: 30080
    hpa: { enabled: false }
  game-service:
    replicas: 1
  engine-worker:
    replicas: 1
    hpa: { enabled: false }
  analysis-worker:
    replicas: 1
  session-manager:
    # Two nodes even on kind, so the handoff demo works: kill one pod under live
    # games and watch them re-home onto the other (see load/chaos).
    replicas: 2
    hpa: { enabled: false }   # kind ships no metrics-server
  web:
    replicas: 1

# The kind cluster runs an ingress-nginx controller (Terraform maps its :80 to
# the host), so front the app with a real ingress in addition to the NodePort.
ingress:
  enabled: true
  className: nginx
  host: ""   # any host — reachable at http://localhost:<ingress_host_port>

