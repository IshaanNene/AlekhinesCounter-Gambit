{{- /*
  Sensitive config the services read via envFrom. In a real environment this is
  supplied out-of-band (sealed-secrets, an external secret store, or Terraform)
  and these defaults are never used — hence the loud placeholder secret.
*/ -}}
apiVersion: v1
kind: Secret
metadata:
  name: acg-secrets
  labels:
    {{- include "acg.labels" (dict "name" "secrets" "root" $) | nindent 4 }}
type: Opaque
stringData:
  ACG_SESSION_SECRET: {{ .Values.secrets.sessionSecret | quote }}
  ACG_POSTGRES_DSN: {{ .Values.secrets.postgresDSN | quote }}
  ACG_S3_ACCESS_KEY: {{ .Values.secrets.s3AccessKey | quote }}
  ACG_S3_SECRET_KEY: {{ .Values.secrets.s3SecretKey | quote }}
  ACG_ERLANG_COOKIE: {{ .Values.secrets.erlangCookie | quote }}
