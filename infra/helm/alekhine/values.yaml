# Umbrella values for the whole platform. Each service is templated from the same
# helpers, so a new replica count or image tag is one line, not a new manifest.
#
# Infra dependencies (Postgres, Redis, Kafka, MinIO, Jaeger) are declared as
# simple single-replica Deployments for a local cluster. In a real environment
# these would be managed services (RDS, ElastiCache, MSK, S3) wired via
# Terraform, and these blocks disabled — see infra/terraform.

global:
  imageRegistry: ""        # e.g. ghcr.io/ishaannene/ — empty for locally-loaded images
  imagePullPolicy: IfNotPresent
  otlpEndpoint: "jaeger:4317"

# The application services. Each is rendered by templates/service.yaml.
services:
  gateway:
    image: alekhinescounter-gambit-gateway:latest
    replicas: 2            # the horizontally-scalable edge; Redis fanout makes this safe
    port: 8080
    metricsPort: 9101
    env:
      ACG_GATEWAY_ADDR: ":8080"
      ACG_GAME_ADDR_CLIENT: "game-service:50051"
      ACG_SESSION_ADDR: "session-manager:50053"
      ACG_REDIS_ADDR: "redis:6379"
      ACG_COOKIE_SECURE: "false"
    envFromSecret: acg-secrets
    hpa:
      enabled: true
      minReplicas: 2
      maxReplicas: 6
      targetCPUUtilizationPercentage: 70

  game-service:
    image: alekhinescounter-gambit-game-service:latest
    replicas: 2
    port: 50051
    metricsPort: 9101
    env:
      ACG_GAME_ADDR: ":50051"
      ACG_ENGINE_ADDR: "engine-worker:50052"
      ACG_SESSION_ADDR: "session-manager:50053"
      ACG_REDIS_ADDR: "redis:6379"
      ACG_KAFKA_BROKERS: "kafka:9092"
      ACG_S3_ENDPOINT: "minio:9000"
      ACG_RUN_MIGRATIONS: "true"
    envFromSecret: acg-secrets

  engine-worker:
    image: alekhinescounter-gambit-engine-worker:latest
    replicas: 3            # stateless and CPU-bound — the thing you scale under load
    port: 50052
    env:
      ACG_S3_ENDPOINT: "minio:9000"   # loads (and seeds) the opening book
    envFromSecret: acg-secrets
    hpa:
      enabled: true
      minReplicas: 3
      maxReplicas: 12
      targetCPUUtilizationPercentage: 80

  analysis-worker:
    image: alekhinescounter-gambit-analysis-worker:latest
    replicas: 2            # scales the Kafka consumer group
    metricsPort: 9101
    env:
      ACG_KAFKA_BROKERS: "kafka:9092"
      ACG_ENGINE_ADDR: "engine-worker:50052"
      ACG_REDIS_ADDR: "redis:6379"
      ACG_S3_ENDPOINT: "minio:9000"
      ACG_ANALYSIS_DEPTH: "12"
    envFromSecret: acg-secrets

  session-manager:
    image: alekhinescounter-gambit-session-manager:latest
    replicas: 1            # stateful (live games); scaling needs sticky routing, deferred
    port: 50053

  web:
    image: alekhinescounter-gambit-web:latest
    replicas: 2
    port: 80

# Sensitive config, injected via the acg-secrets Secret. Placeholders only —
# override with --set or a values file in any real environment.
secrets:
  sessionSecret: "dev-only-secret-change-me-in-production-32b"
  postgresDSN: "postgres://acg:acg@postgres:5432/acg?sslmode=disable"
  s3AccessKey: "acg"
  s3SecretKey: "acg-secret-key"

# A single ingress fronting the app (see templates/ingress.yaml). Off by default;
# the bare NodePort covers Compose and simple setups. Needs an ingress controller.
ingress:
  enabled: false
  className: nginx
  host: ""   # empty matches any host, so http://localhost:<port> works directly

# Toggle the bundled infra off when using managed services.
infra:
  enabled: true

# Bundled infra dependencies, rendered by templates/infra.yaml. Each Service is
# named exactly as the app services address it (postgres, redis, kafka, ...).
infraServices:
  postgres:
    image: postgres:16
    ports: [5432]
    # The source of truth — genuinely persistent, on a PVC that survives restarts
    # and reschedules. PGDATA is a subdirectory of the mount, the standard way to
    # avoid initdb tripping over the volume's root directory.
    persistent: true
    storage: 1Gi
    dataDir: /var/lib/postgresql/data
    fsGroup: 999            # the postgres image runs as uid 999
    env:
      POSTGRES_USER: acg
      POSTGRES_PASSWORD: acg
      POSTGRES_DB: acg
      PGDATA: /var/lib/postgresql/data/pgdata

  redis:
    image: redis/redis-stack-server:7.4.0-v1
    ports: [6379]
    env:
      REDIS_ARGS: "--maxmemory 512mb --maxmemory-policy volatile-lru"

  minio:
    image: minio/minio:RELEASE.2025-04-08T15-41-24Z
    command: ["minio", "server", "/data", "--console-address", ":9001"]
    ports: [9000, 9001]
    # Durable archives (PGN, analysis JSON, opening book) on a PVC.
    persistent: true
    storage: 2Gi
    dataDir: /data
    env:
      MINIO_ROOT_USER: acg
      MINIO_ROOT_PASSWORD: acg-secret-key

  jaeger:
    image: jaegertracing/all-in-one:1.60
    ports: [4317, 16686]
    env:
      COLLECTOR_OTLP_ENABLED: "true"

  kafka:
    image: apache/kafka:3.9.0
    ports: [9092]
    # Kafka here is a transient event bus, not a source of truth (Postgres is), so
    # it is deliberately disposable rather than durable. Single-node KRaft cannot
    # recover its persisted metadata log on restart — the broker hangs forever
    # waiting for a controller stuck re-electing itself — so each container start
    # wipes the log dir and formats fresh. That trades a few in-flight events on a
    # restart (games are re-analysable) for a bus that always comes back up.
    dataDir: /var/lib/kafka/data
    fsGroup: 1000            # the apache/kafka image runs as uid 1000
    command:
      - /bin/sh
      - -c
      - >
        rm -rf /var/lib/kafka/data/* /var/lib/kafka/data/.[!.]* 2>/dev/null || true;
        exec /__cacert_entrypoint.sh /etc/kafka/docker/run
    env:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      # Self-reference the controller over loopback, not the Service. A fresh 3.9
      # KRaft format enables KIP-919 controller registration, which dials this
      # address at startup — and the readiness probe removes the pod from its own
      # Service's endpoints until 9092 is up, so "kafka:9093" has no route and
      # registration times out (a ~60s crash loop). localhost sidesteps the
      # Service entirely, which is correct for a single combined node anyway.
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@localhost:9093"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      CLUSTER_ID: "alekhine-counter-gambit-01"
      # Persist the metadata + message log to the mounted PVC, not the default
      # ephemeral /tmp — this is the whole point of the change.
      KAFKA_LOG_DIRS: "/var/lib/kafka/data"
      # Cap the JVM heap under the pod's memory limit, or the broker OOMKills.
      KAFKA_HEAP_OPTS: "-Xmx512m -Xms256m"
    resources:
      limits: { cpu: "2", memory: "1536Mi" }
