# Local development stack.
# `make up` builds and starts Postgres, the engine worker, the Erlang session
# manager, and the game service. The game service applies embedded migrations on
# startup.

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: acg
      POSTGRES_PASSWORD: acg
      POSTGRES_DB: acg
    ports:
      - "5433:5432" # host 5433 avoids clashing with a local Postgres on 5432
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acg"]
      interval: 3s
      timeout: 3s
      retries: 10

  engine-worker:
    build:
      context: .
      dockerfile: services/engine-worker/Dockerfile
    environment:
      ACG_ENGINE_ADDR: ":50052"
      ACG_STOCKFISH_PATH: "/usr/games/stockfish"
    ports:
      - "50052:50052"

  redis:
    # Stack, not plain redis: Bloom (novelty / PGN dedupe) and TimeSeries
    # (per-player anti-cheat series) ship as modules.
    image: redis/redis-stack-server:7.4.0-v1
    # Cache + fanout only: nothing here is the source of truth, so an eviction
    # policy beats letting it fill up and start refusing writes.
    environment:
      # allkeys-lru would evict the Bloom filter and anti-cheat series, which are
      # not reconstructible from a cache miss. volatile-lru only evicts keys we
      # gave a TTL, so those structures survive pressure.
      REDIS_ARGS: "--maxmemory 512mb --maxmemory-policy volatile-lru --save 60 1000"
    ports:
      # Host 6380: 6379 is commonly taken by a local Redis, which would silently
      # win localhost and serve a module-less server to host-side tools.
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  # MinIO: S3-compatible object storage for PGN archives, analysis artifacts, and
  # opening books. S3-compatible on purpose — the same code and the same client
  # talk to AWS S3 or GCS in Q4 by changing only the endpoint and credentials.
  minio:
    image: minio/minio:RELEASE.2025-04-08T15-41-24Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: acg
      MINIO_ROOT_PASSWORD: acg-secret-key
    ports:
      - "9000:9000"  # S3 API
      - "9001:9001"  # web console
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - miniodata:/data

  # Kafka in KRaft mode: no ZooKeeper. The event backbone that decouples live
  # play from the async analysis pipeline.
  kafka:
    image: apache/kafka:3.9.0
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      # Single broker locally, so nothing can be replicated further than itself.
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      CLUSTER_ID: "alekhine-counter-gambit-01"
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 6s
      timeout: 10s
      retries: 20
    volumes:
      - kafkadata:/var/lib/kafka/data

  # Erlang/OTP: one supervised actor per live game (clocks, presence, reconnects).
  session-manager:
    build:
      context: .
      dockerfile: services/session-manager/Dockerfile
    environment:
      ACG_SESSION_PORT: "50053"
    ports:
      - "50053:50053"

  game-service:
    build:
      context: .
      dockerfile: services/game-service/Dockerfile
    environment:
      ACG_GAME_ADDR: ":50051"
      ACG_ENGINE_ADDR: "engine-worker:50052"
      ACG_SESSION_ADDR: "session-manager:50053"
      ACG_POSTGRES_DSN: "postgres://acg:acg@postgres:5432/acg?sslmode=disable"
      ACG_REDIS_ADDR: "redis:6379"
      ACG_KAFKA_BROKERS: "kafka:9092"
      ACG_ANALYSIS_DEPTH: "12"
      ACG_S3_ENDPOINT: "minio:9000"
      ACG_S3_ACCESS_KEY: "acg"
      ACG_S3_SECRET_KEY: "acg-secret-key"
      ACG_S3_PUBLIC_ENDPOINT: "localhost:9000"
      ACG_RUN_MIGRATIONS: "true"
      ACG_OTLP_ENDPOINT: "jaeger:4317"
      ACG_METRICS_ADDR: ":9101"
    ports:
      - "50051:50051"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      engine-worker:
        condition: service_started
      session-manager:
        condition: service_started

  # Consumes analysis requests from Kafka. Stateless and scalable: `docker compose
  # up --scale analysis-worker=3` divides the partitions between three members of
  # the consumer group, with no change anywhere else.
  analysis-worker:
    build:
      context: .
      dockerfile: services/analysis-worker/Dockerfile
    environment:
      ACG_KAFKA_BROKERS: "kafka:9092"
      ACG_POSTGRES_DSN: "postgres://acg:acg@postgres:5432/acg?sslmode=disable"
      ACG_ENGINE_ADDR: "engine-worker:50052"
      ACG_REDIS_ADDR: "redis:6379"
      ACG_ANALYSIS_DEPTH: "12"
      ACG_S3_ENDPOINT: "minio:9000"
      ACG_S3_ACCESS_KEY: "acg"
      ACG_S3_SECRET_KEY: "acg-secret-key"
      ACG_OTLP_ENDPOINT: "jaeger:4317"
      ACG_METRICS_ADDR: ":9101"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
      engine-worker:
        condition: service_started

  # Public API: GraphQL over HTTP. Translates to internal gRPC; holds no state.
  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    environment:
      ACG_GATEWAY_ADDR: ":8080"
      ACG_GAME_ADDR_CLIENT: "game-service:50051"
      ACG_SESSION_ADDR: "session-manager:50053"
      ACG_GRAPHQL_PLAYGROUND: "true"
      # Local development secret. Generate a real one per environment and keep it
      # out of source control (Q4 moves this to a Kubernetes Secret).
      ACG_SESSION_SECRET: "dev-only-secret-change-me-in-production-32b"
      ACG_COOKIE_SECURE: "false"
      ACG_REDIS_ADDR: "redis:6379"
      ACG_OTLP_ENDPOINT: "jaeger:4317"
      ACG_METRICS_ADDR: ":9101"
    ports:
      - "8080:8080"
    depends_on:
      game-service:
        condition: service_started
      session-manager:
        condition: service_started

  # Static web client, fronted by NGINX which also proxies /graphql and /ws to
  # the gateway so the browser only ever talks to one origin.
  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    ports:
      - "3000:80"
    depends_on:
      gateway:
        condition: service_started

  # ── Observability ────────────────────────────────────────────────────────
  # Jaeger receives OTLP traces directly (no separate collector needed locally).
  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686" # UI
      - "4317:4317"   # OTLP/gRPC
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:16686/"]
      interval: 5s
      timeout: 5s
      retries: 15

  prometheus:
    image: prom/prometheus:v3.1.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./infra/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/observability/alerts.yml:/etc/prometheus/alerts.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.4.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_SECURITY_ADMIN_PASSWORD: "acg"
    volumes:
      - ./infra/observability/grafana-datasources.yml:/etc/grafana/provisioning/datasources/ds.yml:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
      - jaeger

volumes:
  pgdata:
  kafkadata:
  miniodata:
