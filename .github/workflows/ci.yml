name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  GO_VERSION: "1.25"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: gofmt
        run: |
          fmtout=$(gofmt -l . | grep -v '/gen/' || true)
          if [ -n "$fmtout" ]; then echo "needs gofmt:"; echo "$fmtout"; exit 1; fi
      - name: go vet
        run: go vet ./...
      - name: golangci-lint
        # Installed from source so it is built with this job's Go toolchain — a
        # prebuilt binary built with an older Go refuses to lint a newer go.mod
        # target ("language version ... is lower than the targeted Go version").
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.1.6
          "$(go env GOPATH)/bin/golangci-lint" run

  proto:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: bufbuild/buf-action@v1
        with:
          setup_only: true
      - name: Install protoc plugins
        # buf generate shells out to these; the buf action does not provide them.
        # Versions must match the Makefile so generated code is identical.
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.35.2
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.5.1
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Lint protos
        run: buf lint
      - name: Regenerate and check for drift
        run: |
          buf generate
          if ! git diff --exit-code proto/gen; then
            echo "Generated protobuf code is out of date. Run 'make proto' and commit."
            exit 1
          fi

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: acg
          POSTGRES_PASSWORD: acg
          POSTGRES_DB: acg
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U acg"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 10
    env:
      # Store integration tests connect here; migrations are applied below.
      ACG_TEST_DSN: postgres://acg:acg@localhost:5432/acg?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Install Stockfish (for engine tests)
        run: sudo apt-get update && sudo apt-get install -y stockfish
      - name: Make Stockfish discoverable as "stockfish"
        run: sudo ln -sf /usr/games/stockfish /usr/local/bin/stockfish
      - name: Install goose
        run: go install github.com/pressly/goose/v3/cmd/goose@v3.22.1
      - name: Apply migrations
        run: $(go env GOPATH)/bin/goose -dir migrations postgres "$ACG_TEST_DSN" up
      - name: Test
        run: go test ./... -count=1
